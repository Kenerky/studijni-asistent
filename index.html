<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Studijní Asistent 2.0</title>
    <style>
        :root { --p: #4F46E5; --bg: #F9FAFB; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 500px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--p); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav button { background: #eee; color: #333; }
        .nav button.active { background: var(--p); color: white; }
        .tab { display: none; }
        .tab.active { display: block; }
        #response { background: #f0f4ff; padding: 15px; border-radius: 6px; margin-top: 15px; border-left: 4px solid var(--p); }
        .q-box { background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #eee; }
    </style>
</head>
<body>
<div class="card">
    <div id="auth-sec">
        <h2 id="auth-title">Přihlášení</h2>
        <input id="u" placeholder="Jméno"> <input id="p" type="password" placeholder="Heslo">
        <button onclick="handleAuth()" id="auth-btn">Přihlásit se</button>
        <p style="text-align:center; cursor:pointer; color:blue" onclick="toggleAuth()" id="auth-toggle">Nemáte účet? Registrovat</p>
    </div>

    <div id="app-sec" style="display:none">
        <div class="nav">
            <button onclick="showTab('s')" id="ns" class="active">Slovník</button>
            <button onclick="showTab('t')" id="nt">Testy</button>
            <button onclick="logout()" style="background:#ff4444">Odhlásit</button>
        </div>
        <div id="tab-s" class="tab active">
            <input id="q" placeholder="Zadejte pojem...">
            <button onclick="ask()">Vysvětlit</button>
            <div id="response" style="display:none"></div>
        </div>
        <div id="tab-t" class="tab">
            <button onclick="genQuiz()">Vytvořit test z pojmů</button>
            <div id="quiz-area" style="margin-top:15px"></div>
            <hr><h3>Historie</h3><div id="hist"></div>
        </div>
    </div>
</div>

<script>
    let mode = 'login';
    function toggleAuth() {
        mode = mode === 'login' ? 'reg' : 'login';
        document.getElementById('auth-title').innerText = mode === 'login' ? 'Přihlášení' : 'Registrace';
        document.getElementById('auth-btn').innerText = mode === 'login' ? 'Přihlásit se' : 'Vytvořit účet';
        document.getElementById('auth-toggle').innerText = mode === 'login' ? 'Nemáte účet? Registrovat' : 'Máte účet? Přihlásit';
    }
    function showTab(t) {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        document.getElementById('ns').classList.toggle('active', t==='s');
        document.getElementById('nt').classList.toggle('active', t==='t');
        if(t==='t') loadHist();
    }
    async function handleAuth() {
        const url = mode === 'login' ? '/token' : '/register';
        const body = mode === 'login' ? new URLSearchParams({username:u.value, password:p.value}) : JSON.stringify({username:u.value, password:p.value});
        const h = mode === 'login' ? {'Content-Type':'application/x-www-form-urlencoded'} : {'Content-Type':'application/json'};
        const r = await fetch(url, {method:'POST', headers:h, body});
        const d = await r.json();
        if(r.ok) { if(mode==='login') { localStorage.setItem('token', d.access_token); location.reload(); } else toggleAuth(); }
        else alert(d.detail);
    }
    function logout() { localStorage.removeItem('token'); location.reload(); }
    window.onload = () => { if(localStorage.getItem('token')) { auth-sec.style.display='none'; app-sec.style.display='block'; } };
    
    async function ask() {
        response.style.display='block'; response.innerText='⏳...';
        const r = await fetch('/ai', {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+localStorage.getItem('token')}, body:JSON.stringify({dotaz:q.value})});
        const d = await r.json(); response.innerText = d.odpoved || d.error;
    }

    let currentQ = [];
    async function genQuiz() {
        quiz-area.innerText = 'Generování...';
        const r = await fetch('/quiz/generate', {headers:{'Authorization':'Bearer '+localStorage.getItem('token')}});
        const d = await r.json();
        if(d.error) { quiz-area.innerText = d.error; return; }
        currentQ = d.quiz;
        quiz-area.innerHTML = d.quiz.map((x,i) => `<div class="q-box"><b>${x.otazka}</b><br>` + x.moznosti.map((m,j) => `<label><input type="radio" name="q${i}" value="${j}">${m}</label><br>`).join('') + `</div>`).join('') + `<button onclick="check()">Odeslat</button>`;
    }
    async function check() {
        let s = 0; currentQ.forEach((x,i) => { if(document.querySelector(`input[name="q${i}"]:checked`)?.value == x.spravna_index) s++; });
        const res = `${s}/${currentQ.length}`; alert(`Skóre: ${res}`);
        await fetch('/quiz/save', {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+localStorage.getItem('token')}, body:JSON.stringify({score:res})});
        loadHist();
    }
    async function loadHist() {
        const r = await fetch('/quiz/history', {headers:{'Authorization':'Bearer '+localStorage.getItem('token')}});
        const d = await r.json();
        hist.innerHTML = d.history.map(x => `<div style="display:flex;justify-content:space-between;font-size:13px"><span>${x.date}</span><b>${x.score}</b></div>`).join('');
    }
</script>
</body>
</html>
