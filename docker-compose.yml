version: '3.8'
services:
  app:
    build: .
    container_name: studijni-asistent
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
